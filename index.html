<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ForgeFit" />
  <meta name="description" content="ForgeFit — Build muscle. Track progress. Progressive overload made simple." />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="/icons/icon-192.svg" />
  <link rel="icon" type="image/svg+xml" sizes="512x512" href="/icons/icon-512.svg" />
  <link rel="manifest" href="/manifest.json" />
  <title>ForgeFit</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />
</head>
<body>
  <div id="splash">
    <div class="splash-content">
      <div class="splash-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <path d="M32 4L40 20L56 22L44 34L48 52L32 42L16 52L20 34L8 22L24 20L32 4Z" fill="url(#splashGrad)" stroke="none"/>
          <defs>
            <linearGradient id="splashGrad" x1="32" y1="4" x2="32" y2="52">
              <stop offset="0%" stop-color="#00E676"/>
              <stop offset="100%" stop-color="#6C63FF"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="splash-title">ForgeFit</h1>
      <div class="splash-loader">
        <div class="splash-bar"></div>
      </div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <main id="view-container"></main>
    <nav id="bottom-nav"></nav>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
